<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Extractor</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>LinkedIn Sales Extractor</h1>
    </header>

    <section class="config-section">
      <div class="field">
        <label for="keywords">Keywords <span class="hint">(one per line)</span></label>
        <textarea id="keywords" rows="3" placeholder="Company incorporation&#10;Business consulting&#10;Tax advisory">Company incorporation</textarea>
      </div>

      <div class="field">
        <label for="locations">Locations <span class="hint">(one per line)</span></label>
        <textarea id="locations" rows="3" placeholder="Poland&#10;United Kingdom&#10;Germany">Poland</textarea>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="headcount">Headcount</label>
          <select id="headcount">
            <option value="A">1</option>
            <option value="B">1-10</option>
            <option value="C" selected>11-50</option>
            <option value="D">51-200</option>
            <option value="E">201-500</option>
            <option value="F">501-1000</option>
            <option value="G">1001-5000</option>
            <option value="H">5001-10000</option>
            <option value="I">10001+</option>
          </select>
        </div>
        <div class="field">
          <label for="delay">Delay (s)</label>
          <input type="number" id="delay" value="3" min="1" max="30">
        </div>
        <div class="field">
          <label for="maxPages">Max pages</label>
          <input type="number" id="maxPages" value="5" min="1" max="100">
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="btnStart" class="btn btn-primary">Start</button>
      <button id="btnPause" class="btn btn-warning" disabled>Pause</button>
      <button id="btnResume" class="btn btn-success" disabled>Resume</button>
      <button id="btnStop" class="btn btn-danger" disabled>Stop</button>
    </section>

    <section class="progress-section" id="progressSection" style="display:none">
      <div class="progress-info">
        <div><strong>Status:</strong> <span id="statusText">Idle</span></div>
        <div><strong>Keyword:</strong> <span id="currentKeyword">-</span></div>
        <div><strong>Location:</strong> <span id="currentLocation">-</span></div>
        <div><strong>Page:</strong> <span id="currentPage">-</span> | <strong>Companies:</strong> <span id="companyCount">0</span> | <strong>People:</strong> <span id="peopleCount">0</span></div>
      </div>
      <div class="log-container">
        <div id="log" class="log"></div>
      </div>
    </section>

    <section class="export-section">
      <button id="btnExportCSV" class="btn btn-export">Export CSV</button>
      <button id="btnClearData" class="btn btn-clear">Clear Data</button>
    </section>

    <section class="data-section">
      <h3>Results (<span id="tableCount">0</span>)</h3>
      <div class="table-container">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Contact</th>
              <th>Title</th>
              <th>Country</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
